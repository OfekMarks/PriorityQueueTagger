version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: priorityqueue
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d priorityqueue"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-seed:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      # Injected strictly at startup, no .env required
      DATABASE_URL: postgresql://postgres:postgrespassword@db:5432/priorityqueue
    depends_on:
      db:
        condition: service_healthy
    command: python scripts/seed_data.py

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgrespassword@db:5432/priorityqueue
      MAPBOX_ACCESS_TOKEN: ${MAPBOX_ACCESS_TOKEN}
    ports:
      - "8000:8000"
    depends_on:
      db-seed:
        # Wait for the seeding script to finish before starting the API
        condition: service_completed_successfully
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend

volumes:
  pgdata: